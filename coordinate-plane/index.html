<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordinate Plane — Floor Plan Manager</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="app-header">
        <h1>Floor Plan Manager</h1>
        <div class="toolbar">
            <button id="btn-toggle-grid" class="btn active" title="Toggle Grid">
                <svg width="18" height="18" viewBox="0 0 18 18"><path d="M0 6h18M0 12h18M6 0v18M12 0v18" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
                <span>Grid</span>
            </button>
            <button id="btn-toggle-labels" class="btn active" title="Toggle Labels">
                <svg width="18" height="18" viewBox="0 0 18 18"><text x="3" y="14" font-size="14" fill="currentColor">A</text></svg>
                <span>Labels</span>
            </button>
            <button id="btn-toggle-dims" class="btn active" title="Toggle Dimensions">
                <svg width="18" height="18" viewBox="0 0 18 18"><path d="M2 9h14M2 6v6M16 6v6" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
                <span>Dims</span>
            </button>
            <div class="separator"></div>
            <button id="btn-toggle-edit" class="btn" title="Toggle Edit Mode">
                <svg width="18" height="18" viewBox="0 0 18 18"><path d="M13.5 2.5l2 2L6 14H4v-2L13.5 2.5z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
                <span>Edit</span>
            </button>
            <button id="btn-reset" class="btn" title="Reset Layout">
                <svg width="18" height="18" viewBox="0 0 18 18"><path d="M3 9a6 6 0 1 1 1.8 4.3" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M3 5v4h4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
                <span>Reset</span>
            </button>
            <button id="btn-export" class="btn" title="Export JSON">
                <svg width="18" height="18" viewBox="0 0 18 18"><path d="M9 2v10M5 8l4 4 4-4M3 14h12" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
                <span>Export</span>
            </button>
        </div>
    </header>

    <main class="app-main">
        <div class="canvas-container" id="canvas-container">
            <svg id="floor-plan-svg" xmlns="http://www.w3.org/2000/svg"></svg>
            <div id="tooltip" class="tooltip" style="display:none;"></div>
        </div>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-section">
                <h2>Room Info</h2>
                <div class="info-row"><span class="info-label">Width</span><span class="info-value">42 ft</span></div>
                <div class="info-row"><span class="info-label">Height</span><span class="info-value">32 ft</span></div>
                <div class="info-row"><span class="info-label">Area</span><span class="info-value">1,344 sq ft</span></div>
            </div>

            <div class="sidebar-section" id="selection-panel" style="display:none;">
                <h2>Selected Element</h2>
                <div class="info-row"><span class="info-label">Name</span><span class="info-value" id="sel-name">—</span></div>
                <div class="info-row"><span class="info-label">Type</span><span class="info-value" id="sel-type">—</span></div>
                <div class="info-row"><span class="info-label">Position</span><span class="info-value" id="sel-pos">—</span></div>
                <div class="info-row"><span class="info-label">Size</span><span class="info-value" id="sel-size">—</span></div>
            </div>

            <div class="sidebar-section" id="no-selection-panel">
                <p class="hint">Click an element on the floor plan to see its details.</p>
            </div>

            <div class="sidebar-section">
                <h2>Legend</h2>
                <div id="legend-list" class="legend-list"></div>
            </div>

            <div class="sidebar-section">
                <h2>Coordinates</h2>
                <div class="info-row"><span class="info-label">Mouse</span><span class="info-value" id="mouse-coords">—</span></div>
            </div>
        </aside>
    </main>

    <script src="js/coordinates.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
